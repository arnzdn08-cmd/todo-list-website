<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Todo List</title>
    <!-- Link to our CSS stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Date outside the white box, on the colored background -->
    <div class="top-date">
        <div id="currentDate" class="date-text"></div>
    </div>
    
    <div class="container">
        <!-- Navigation links -->
        <div class="navigation-section">
            <a href="schedule.html" class="nav-link">Schedule</a>
            <a href="undo.html" class="nav-link">Undo</a>
            <a href="overdue.html" class="nav-link">Overdue</a>
        </div>
        
        <!-- Add button (plus icon) -->
        <div class="add-todo-section">
            <button id="showAddButton" class="plus-button">+</button>
        </div>
        
        <!-- Form to add new tasks (hidden by default) -->
        <div id="inputSection" class="input-section" style="display: none;">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Enter a new task..."
                class="task-input"
            >
            <!-- Button to add the task -->
            <button id="addButton" class="add-button">Add Task</button>
        </div>
        
        <!-- Time selection popup (hidden by default) -->
        <div id="timePopup" class="time-popup" style="display: none;">
            <div class="time-popup-content">
                <h3>Set Times for: <span id="popupTaskText"></span></h3>
                <div class="time-section">
                    <div class="time-input-group">
                        <label for="startTimeInput">Start Time:</label>
                        <input 
                            type="datetime-local" 
                            id="startTimeInput" 
                            class="time-input"
                        >
                    </div>
                    <div class="time-input-group">
                        <label for="deadlineInput">Deadline:</label>
                        <input 
                            type="datetime-local" 
                            id="deadlineInput" 
                            class="time-input"
                        >
                    </div>
                </div>
                <div class="popup-buttons">
                    <button id="confirmButton" class="confirm-button">Done</button>
                    <button id="cancelButton" class="cancel-button">Skip</button>
                </div>
            </div>
        </div>
        
        <!-- Undo notification that appears temporarily for completed tasks -->
        <div id="undoNotification" class="undo-notification" style="display: none;">
            <span id="undoNotificationText">Task completed!</span>
            <button id="undoButton" class="undo-button">Undo</button>
        </div>
        
        <!-- Undo notification that appears temporarily for deleted tasks -->
        <div id="deleteUndoNotification" class="undo-notification delete-notification" style="display: none;">
            <span>Task deleted!</span>
            <button id="deleteUndoButton" class="undo-button">Undo</button>
        </div>
        
        <!-- List container where tasks will be displayed -->
        <ul id="taskList" class="task-list">
            <!-- Tasks will be added here dynamically by JavaScript -->
        </ul>
    </div>

    <!-- Home button at bottom left -->
    <a href="welcome.html" class="home-button-bottom">Home</a>

    <!-- Link to our JavaScript file (placed at the bottom so HTML loads first) -->
    <script src="script.js"></script>
</body>
</html>
