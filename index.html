<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-date">
        <div id="currentDate" class="date-text"></div>
    </div>
    
    <div class="container">
        <div class="navigation-section">
            <a href="schedule.html" class="nav-link">Schedule</a>
            <a href="undo.html" class="nav-link">Undo</a>
            <a href="overdue.html" class="nav-link">Overdue</a>
        </div>
        
        <div class="add-todo-section">
            <button id="showAddButton" class="plus-button">+</button>
        </div>
        
        <div id="inputSection" class="input-section" style="display: none;">
            <input type="text" id="taskInput" placeholder="Enter a new task..." class="task-input">
            <button id="addButton" class="add-button">Add Task</button>
        </div>
        
        <div id="timePopup" class="time-popup" style="display: none;">
            <div class="time-popup-content">
                <h3>Set Times for: <span id="popupTaskText"></span></h3>
                <div class="time-section">
                    <div class="time-input-group">
                        <label for="startTimeInput">Start Time:</label>
                        <input type="datetime-local" id="startTimeInput" class="time-input">
                    </div>
                    <div class="time-input-group">
                        <label for="deadlineInput">Deadline:</label>
                        <input type="datetime-local" id="deadlineInput" class="time-input">
                    </div>
                </div>
                <div class="popup-buttons">
                    <button id="confirmButton" class="confirm-button">Done</button>
                    <button id="cancelButton" class="cancel-button">Skip</button>
                </div>
            </div>
        </div>
        
        <div id="undoNotification" class="undo-notification" style="display: none;">
            <span>Task completed!</span>
            <button id="undoButton" class="undo-button">Undo</button>
        </div>
        <div id="deleteUndoNotification" class="undo-notification delete-notification" style="display: none;">
            <span>Task deleted!</span>
            <button id="deleteUndoButton" class="undo-button">Undo</button>
        </div>
        
        <ul id="taskList" class="task-list"></ul>
    </div>

    <button onclick="logOut()" class="home-button-bottom">Logout</button>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
