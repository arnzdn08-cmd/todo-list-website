<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overdue Tasks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Overdue Tasks</h1>
        <div class="navigation-section">
            <a href="index.html" class="nav-link back-button">Back</a>
        </div>
        <ul id="taskList" class="task-list"></ul>
    </div>

    <div id="reschedulePopup" class="time-popup" style="display: none;">
        <div class="time-popup-content">
            <h3>Reschedule Task: <span id="rescheduleTaskText"></span></h3>
            <div class="time-section">
                <div class="time-input-group">
                    <label for="newDeadlineInput">New Deadline:</label>
                    <input type="datetime-local" id="newDeadlineInput" class="time-input">
                </div>
            </div>
            <div class="popup-buttons">
                <button id="confirmRescheduleButton" class="confirm-button">Reschedule</button>
                <button id="cancelRescheduleButton" class="cancel-button">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="overdue.js"></script>
</body>
</html>
