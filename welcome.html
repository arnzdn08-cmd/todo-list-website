<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Greeting outside the white box, on the colored background -->
    <div id="greetingSection" class="top-greeting" style="display: none;">
        <h1 id="greetingText" class="greeting-text">Hello!</h1>
    </div>
    
    <div class="container welcome-container">
        <div id="nameInputSection" class="welcome-section">
            <h1>Welcome!</h1>
            <p>Please enter your name to get started:</p>
            <input 
                type="text" 
                id="nameInput" 
                placeholder="Enter your name..."
                class="name-input"
            >
            <button id="saveNameButton" class="add-button">Continue</button>
        </div>
        
        <div id="welcomeMessageSection" class="welcome-section" style="display: none;">
            <p class="welcome-message">Get ready to plan your day</p>
            <button id="goToTasksButton" class="add-button">Go to Today's Tasks</button>
        </div>
    </div>

    <script src="welcome.js"></script>
</body>
</html>
