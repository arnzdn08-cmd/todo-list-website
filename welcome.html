<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container welcome-container">
        <div class="welcome-section">
            <h1>📝 Todo App</h1>
            <p class="welcome-message">Sign in or create an account to get started.</p>

            <input type="text" id="usernameInput" placeholder="Username" class="name-input" autocomplete="off">
            <input type="password" id="passwordInput" placeholder="Password" class="name-input">

            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 10px;">
                <button id="loginButton" class="add-button">Login</button>
                <button id="signupButton" class="add-button">Sign Up</button>
            </div>

            <p id="message" style="color: red; margin-top: 20px; min-height: 24px; text-align:center;"></p>
        </div>
    </div>

    <script type="module" src="welcome.js"></script>
</body>
</html>
